name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Checkstyle
        run: mvn -B clean verify

      - name: Upload Paper JAR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: telehop-paper
          path: paper/target/telehop-paper-*.jar
          if-no-files-found: error

      - name: Upload Velocity JAR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: telehop-velocity
          path: velocity/target/telehop-velocity-*.jar
          if-no-files-found: error
