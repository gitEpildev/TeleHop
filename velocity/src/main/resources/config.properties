# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — Velocity Proxy Configuration
# ═══════════════════════════════════════════════════════════════════════
#
#  This file is for the VELOCITY PROXY only (not Paper servers).
#  It lives at: plugins/telehop-velocity/config.properties
#
#  The proxy acts as the central router — it forwards teleport requests,
#  TPA packets, and player-list updates between all Paper backends.
#
#  After making changes, restart the Velocity proxy.
#
# ═══════════════════════════════════════════════════════════════════════


# ── MySQL Database ──────────────────────────────────────────────────────
#
#  MUST be the exact same database that all Paper backends connect to.
#  TeleHop will not work if any server points to a different database.
#
#  mysql.host      — IP or hostname of the MySQL server.
#                    Use 127.0.0.1 if MySQL runs on the same machine.
#  mysql.port      — MySQL port (default 3306).
#  mysql.database  — Database name (must already exist).
#  mysql.username  — MySQL user with SELECT/INSERT/UPDATE/DELETE.
#  mysql.password  — Password for the MySQL user.
#  mysql.poolSize  — Connection pool size. 5 is fine for most setups.
#                    Increase to 10 for 100+ concurrent players.
#
#  Example:
#    mysql.host=10.0.0.5
#    mysql.port=3306
#    mysql.database=telehop
#    mysql.username=telehop
#    mysql.password=s3cure-passw0rd
#    mysql.poolSize=5

mysql.host=127.0.0.1
mysql.port=3306
mysql.database=telehop
mysql.username=telehop
mysql.password=change-me
mysql.poolSize=5


# ── Messaging Tuning ───────────────────────────────────────────────────
#
#  Internal settings for packet deduplication and timeouts.
#  You almost never need to change these.
#
#  messaging.dedupeWindowMs   — Milliseconds to remember processed
#                               packets (prevents duplicates).
#                               Default: 30000 (30 seconds).
#  messaging.requestTimeoutMs — Milliseconds to wait for a response
#                               from a backend server before giving up.
#                               Default: 10000 (10 seconds).
#                               Increase if backends are far apart.

messaging.dedupeWindowMs=30000
messaging.requestTimeoutMs=10000


# ── Server Configuration ───────────────────────────────────────────────
#
#  servers.hub — The name of the lobby/hub server. When a player runs
#                /spawn, they are sent to this server. This name MUST
#                match an entry in your velocity.toml [servers] section.
#
#                Example: if velocity.toml has  lobby = "127.0.0.1:25565"
#                then set  servers.hub=lobby
#
#  servers.backends — A comma-separated list of ALL servers that run
#                     the TeleHop Paper plugin. Include the hub server.
#                     Each name must match a velocity.toml [servers] entry.
#
#                     No spaces between names, just commas.
#
#  Example — single server:
#    servers.hub=lobby
#    servers.backends=lobby
#
#  Example — three servers:
#    servers.hub=lobby
#    servers.backends=lobby,eu,usa
#
#  Example — large network:
#    servers.hub=lobby
#    servers.backends=lobby,eu,usa,creative,skyblock,prison

servers.hub=lobby
servers.backends=lobby
