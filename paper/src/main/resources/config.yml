# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — Paper Backend Configuration
# ═══════════════════════════════════════════════════════════════════════
#
#  This file controls TeleHop on a single Paper server.
#  Every Paper server in your network needs its own copy of this file
#  with "server-name" set to match the name registered in velocity.toml.
#
#  Most settings can be reloaded with /telehop reload.
#  MySQL changes require a full server restart.
#
# ═══════════════════════════════════════════════════════════════════════


# ── Language ──────────────────────────────────────────────────────────────
#
#  Language for all player-facing messages.
#  Available: en (English), nl (Dutch), de (German), es (Spanish),
#             zh (Chinese), pl (Polish)
#
#  Language files are in plugins/TeleHop/languages/. You can edit them
#  or add your own (e.g. "fr.yml") and set language to "fr".
#  Missing keys automatically fall back to English.
#
#  Reloadable with /telehop reload.

language: "en"


# ── Feature Toggles ──────────────────────────────────────────────────────
#
#  Enable or disable entire TeleHop modules. When a feature is set to
#  false, its commands still exist but display a "feature disabled" message.
#
#  All features are enabled by default. Set to false to disable.

features:
  spawn: true
  rtp: true
  tpa: true
  warps: true           # admin warps (/warp, /setwarp, /delwarp, /warps)
  player-warps: true    # player warps (/pwarp)
  admin-tp: true        # /tp, /tphere


# ── Identity ────────────────────────────────────────────────────────────
#
#  server-name  — The name of THIS server, exactly as it appears in
#                 your Velocity velocity.toml under [servers].
#
#                 Example: if velocity.toml has  lobby = "127.0.0.1:25565"
#                 then set server-name to "lobby".
#
#  hub-server   — The server players are sent to when they type /spawn.
#                 This must also match a name from velocity.toml.
#
#  IMPORTANT: These names are case-sensitive and must match Velocity
#  exactly, or /spawn and cross-server teleports will silently fail.
#
#  Examples for a 3-server network:
#
#    Lobby server:                   USA server:
#      server-name: "lobby"           server-name: "usa"
#      hub-server:  "lobby"           hub-server:  "lobby"
#
#    EU server:
#      server-name: "eu"
#      hub-server:  "lobby"

server-name: "lobby"
hub-server: "lobby"


# ── Server List ─────────────────────────────────────────────────────────
#
#  A map of every server in the network. This is used for tab-completion
#  of player names, the RTP region selector GUI, and cross-server
#  teleport routing.
#
#  Format:
#    <label>: "<velocity-name>"
#
#    - label        = A friendly name you choose (shown in GUIs/logs).
#    - velocity-name = The exact server name from velocity.toml.
#
#  You can list up to 32 servers. Only list servers that are running
#  the TeleHop Paper plugin.
#
#  Example — single-server setup:
#    servers:
#      lobby: "lobby"
#
#  Example — three-server network:
#    servers:
#      lobby: "lobby"
#      eu: "eu"
#      us: "usa"
#
#  Example — large network:
#    servers:
#      lobby: "lobby"
#      survival-eu: "eu"
#      survival-us: "usa"
#      creative: "creative"
#      skyblock: "skyblock"

servers:
  lobby: "lobby"
  eu: "eu"
  us: "usa"
  # creative: "creative"


# ── MySQL Database ──────────────────────────────────────────────────────
#
#  TeleHop stores warps, player locations, and teleport requests in
#  MySQL so they work across all servers. Every Paper backend AND the
#  Velocity proxy MUST connect to the SAME database.
#
#  How to set up:
#    1. Create a MySQL 8.0+ database (e.g. "telehop").
#    2. Create a user with SELECT, INSERT, UPDATE, DELETE privileges.
#    3. Enter the credentials below on EVERY server (same values).
#
#  host      — IP or hostname of the MySQL server.
#              Use "127.0.0.1" if MySQL is on the same machine.
#              Use a public IP if your servers are on different machines.
#  port      — MySQL port (default 3306).
#  database  — Name of the database you created.
#  username  — MySQL username.
#  password  — MySQL password.
#  pool-size — Number of database connections to keep open.
#              5 is fine for most servers. Increase to 10 for 100+ players.

mysql:
  host: "127.0.0.1"
  port: 3306
  database: "telehop"
  username: "telehop"
  password: "change-me"
  pool-size: 5


# ── Messaging ───────────────────────────────────────────────────────────
#
#  Internal settings for cross-server packet deduplication and timeouts.
#  You almost never need to change these.
#
#  dedupe-window-ms    — How long (milliseconds) to remember processed
#                        packets to avoid duplicates. Default 30000 (30s).
#  request-timeout-ms  — How long to wait for a response from another
#                        server before giving up. Default 10000 (10s).
#                        Increase if you have high-latency connections.

messaging:
  dedupe-window-ms: 30000
  request-timeout-ms: 10000


# ── TPA (Teleport Ask) ─────────────────────────────────────────────────
#
#  Controls the /tpa, /tpahere, /tpaaccept, /tpadeny, /tpacancel system.
#
#  timeout-seconds   — How long the receiving player has to accept/deny
#                      before the request automatically expires.
#                      Default: 60 (1 minute).
#  cooldown-seconds  — How long a player must wait after sending a TPA
#                      before they can send another one.
#                      Default: 10 seconds. Set to 0 to disable.
#  delay-seconds     — Warmup countdown after /tpaaccept before the
#                      teleport fires. The acceptor must stand still.
#                      Set to 0 for instant teleport (no warmup).
#                      Default: 0.
#  cancel-on-move    — If true, moving during the TPA warmup countdown
#                      cancels the teleport. Only applies when
#                      delay-seconds > 0. Default: true.

tpa:
  timeout-seconds: 60
  cooldown-seconds: 10
  delay-seconds: 0
  cancel-on-move: true


# ── RTP (Random Teleport) ──────────────────────────────────────────────
#
#  Controls the /rtp command. Players are teleported to a random safe
#  location in the selected region and dimension.
#
#  cooldown-seconds  — How long a player must wait between RTP uses.
#                      Default: 30 seconds. Set to 0 to disable.
#  delay-seconds     — Warmup countdown before the RTP search starts.
#                      Set to 0 for instant teleport. Default: 0.
#  cancel-on-move    — If true, moving during the RTP warmup countdown
#                      cancels the teleport. Only applies when
#                      delay-seconds > 0. Default: true.
#  max-radius        — Hard cap on how far from 0,0 the RTP can land.
#                      Prevents players from going beyond the world
#                      border. Set to -1 for no limit.
#                      Default: 25000.
#
#  Safety: RTP automatically avoids caves, water, lava, ice, and other
#  dangerous blocks. Overworld spawns always have sky access.

rtp:
  cooldown-seconds: 30
  delay-seconds: 0
  cancel-on-move: true
  max-radius: 25000

  # ── RTP Regions ─────────────────────────────────────────────────────
  #
  #  Regions define WHERE players can randomly teleport.
  #  Each region has its own world, radius, and GUI icon.
  #
  #  If you only define ONE region, the region picker GUI is skipped
  #  and players go straight to the dimension picker.
  #
  #  If you define TWO or more, players see a GUI to choose which
  #  region they want before picking a dimension.
  #
  #  Settings per region:
  #    world     — The Minecraft world name (e.g. "world").
  #    radius    — How far from 0,0 the random location can be.
  #    gui       — How the region appears in the selection menu:
  #      material — A Minecraft item ID (e.g. GRASS_BLOCK, BLUE_CONCRETE).
  #      name     — Display name (supports MiniMessage color tags).
  #      lore     — Description lines shown below the item name.
  #
  #  MiniMessage color reference:
  #    <red>, <green>, <blue>, <aqua>, <gold>, <gray>, <bold>,
  #    <gradient:red:blue>text</gradient>, <#ff5555>hex colors</#ff5555>
  #
  #  ── Example: single region (no GUI picker) ──
  #
  #  regions:
  #    default:
  #      world: "world"
  #      radius: 25000
  #      gui:
  #        material: "GRASS_BLOCK"
  #        name: "<green><bold>Wilderness</bold>"
  #        lore:
  #          - "<gray>Random teleport anywhere"
  #
  #  ── Example: multi-region for a US/EU network ──
  #
  #  regions:
  #    us:
  #      world: "world"
  #      radius: 5000
  #      gui:
  #        material: "RED_CONCRETE"
  #        name: "<red><bold>US Region</bold>"
  #        lore:
  #          - "<gray>Random teleport in the US"
  #    eu:
  #      world: "world"
  #      radius: 5000
  #      gui:
  #        material: "BLUE_CONCRETE"
  #        name: "<aqua><bold>EU Region</bold>"
  #        lore:
  #          - "<gray>Random teleport in the EU"
  #    creative:
  #      world: "creative_world"
  #      radius: 10000
  #      gui:
  #        material: "DIAMOND_BLOCK"
  #        name: "<light_purple><bold>Creative</bold>"
  #        lore:
  #          - "<gray>Random spot in the creative world"

  regions:
    default:
      world: "world"
      radius: 25000
      gui:
        material: "GRASS_BLOCK"
        name: "<green><bold>Default Region</bold>"
        lore:
          - "<gray>Random teleport in the default region"

  # ── Dimension World Names ───────────────────────────────────────────
  #
  #  Maps dimension types to the actual world folder names on THIS server.
  #  These are used when a player picks Overworld / Nether / The End
  #  in the RTP dimension selector.
  #
  #  Default world names for a standard Paper server:
  #    overworld: "world"
  #    nether:    "world_nether"
  #    end:       "world_the_end"
  #
  #  If you renamed your worlds (e.g. with Multiverse), update these
  #  to match. For example:
  #    overworld: "survival"
  #    nether:    "survival_nether"
  #    end:       "survival_the_end"

  dimensions:
    overworld: "world"
    nether: "world_nether"
    end: "world_the_end"

  # ── RTP GUI Appearance ──────────────────────────────────────────────
  #
  #  Customize the chest-menu titles and sizes.
  #
  #  title — Supports MiniMessage formatting.
  #  rows  — Number of rows in the chest GUI (1-6). Default 3 = 27 slots.

  gui:
    region-menu:
      title: "<dark_purple>Select Region</dark_purple>"
      rows: 3
    dimension-menu:
      title: "<gold>Select Dimension</gold>"
      rows: 3


# ── Spawn Point ─────────────────────────────────────────────────────────
#
#  The exact location players teleport to when they use /spawn on the
#  hub server. Only matters on the server set as "hub-server" above;
#  on other servers /spawn transfers players to the hub first.
#
#  world — World name.
#  x, z  — Horizontal coordinates.
#  y     — Vertical coordinate (height). Make sure this is above ground.
#  yaw   — Horizontal rotation (0 = south, 90 = west, 180 = north, 270 = east).
#  pitch — Vertical rotation (-90 = straight up, 0 = level, 90 = straight down).
#
#  To find your current coordinates in-game, press F3 and look for
#  "XYZ" and "Facing".

spawn:
  location:
    world: "world"
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0


# ── Audit Logging ───────────────────────────────────────────────────────
#
#  When enabled, TeleHop writes a log entry for every teleport, warp
#  creation/deletion, and admin action to the server console.
#  Useful for tracking abuse or debugging.
#
#  enabled — true or false. Default: false.

# ── Teleport Display ──────────────────────────────────────────────────
#
#  Controls the visual countdown shown during warmup delays (RTP and TPA).
#
#  show-countdown — If true, an action bar message counts down each
#                   second (5... 4... 3... 2... 1...) during the warmup
#                   period. The format is controlled by the
#                   "countdown-actionbar" key in the language file.
#                   Default: true.

teleport:
  show-countdown: true


audit:
  enabled: false
