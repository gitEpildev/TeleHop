# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — Nederlands (nl)
# ═══════════════════════════════════════════════════════════════════════
#
#  MiniMessage-formaat. Referentie: https://docs.advntr.dev/minimessage/
#
#  Placeholders (NIET vertalen):
#    <target>  — doelspeler            <sender>  — verzendende speler
#    <name>    — warp-naam             <warps>   — kommagescheiden lijst
#    <count>   — huidig aantal warps   <limit>   — warplimiet
#    <player>  — andere speler
#
# ═══════════════════════════════════════════════════════════════════════

prefix: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> "

# ── Algemeen ────────────────────────────────────────────────────────────
no-permission: "<red>Je hebt geen toestemming om dit commando te gebruiken."
player-not-found: "<red>Die speler is niet online."
console-not-allowed: "<red>Dit commando kan alleen in-game worden gebruikt."
feature-disabled: "<red>Deze functie is uitgeschakeld op deze server."

# ── TPA ─────────────────────────────────────────────────────────────────
request-sent: "<aqua>Teleportverzoek verzonden naar <gold><target></gold><aqua>."
request-received: "<aqua><sender></aqua> <gray>wil naar jou teleporteren. Gebruik</gray> <light_purple>/tpaaccept</light_purple> <gray>of</gray> <red>/tpadeny</red><gray>.</gray>"
request-received-here: "<aqua><sender></aqua> <gray>wil dat je naar hen teleporteert. Gebruik</gray> <light_purple>/tpaaccept</light_purple> <gray>of</gray> <red>/tpadeny</red><gray>.</gray>"
request-actions: "<click:run_command:'/tpaaccept'><light_purple><bold>[ACCEPTEREN]</bold></light_purple></click> <click:run_command:'/tpadeny'><red><bold>[WEIGEREN]</bold></red></click>"
request-accepted: "<green>Teleportverzoek geaccepteerd."
request-denied: "<red>Teleportverzoek geweigerd."
request-expired: "<yellow>Teleportverzoek verlopen."
request-cancelled: "<gold>Teleportverzoek geannuleerd."
request-none-pending: "<red>Je hebt geen openstaand teleportverzoek."
request-none-outgoing: "<red>Je hebt geen uitgaand teleportverzoek."
tpa-cooldown: "<yellow>TPA heeft een cooldown. Nog <gold><seconds>s</gold><yellow>."
tpa-warmup: "<yellow>Niet bewegen! Teleporteren over <gold><seconds></gold><yellow> seconden..."
tpa-warmup-cancelled: "<red>Teleportatie geannuleerd — je hebt bewogen."

# ── Aftellen (actiebalk) ─────────────────────────────────────────────
