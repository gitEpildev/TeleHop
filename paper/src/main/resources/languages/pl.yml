# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — Polski (pl)
# ═══════════════════════════════════════════════════════════════════════
#
#  Format MiniMessage. Dokumentacja: https://docs.advntr.dev/minimessage/
#
#  Symbole zastępcze (NIE tłumacz):
#    <target>  — gracz docelowy        <sender>  — gracz wysyłający
#    <name>    — nazwa warpu           <warps>   — lista rozdzielona przecinkami
#    <count>   — aktualna liczba       <limit>   — limit warpów
#    <player>  — inny gracz
#
# ═══════════════════════════════════════════════════════════════════════

prefix: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> "

# ── Ogólne ──────────────────────────────────────────────────────────────
no-permission: "<red>Nie masz uprawnień do użycia tej komendy."
player-not-found: "<red>Ten gracz nie jest online."
console-not-allowed: "<red>Ta komenda może być użyta tylko w grze."
feature-disabled: "<red>Ta funkcja jest wyłączona na tym serwerze."

# ── TPA ─────────────────────────────────────────────────────────────────
request-sent: "<aqua>Prośba o teleportację wysłana do <gold><target></gold><aqua>."
request-received: "<aqua><sender></aqua> <gray>chce się do ciebie teleportować. Użyj</gray> <light_purple>/tpaaccept</light_purple> <gray>lub</gray> <red>/tpadeny</red><gray>.</gray>"
request-received-here: "<aqua><sender></aqua> <gray>chce, żebyś się do niego teleportował. Użyj</gray> <light_purple>/tpaaccept</light_purple> <gray>lub</gray> <red>/tpadeny</red><gray>.</gray>"
request-actions: "<click:run_command:'/tpaaccept'><light_purple><bold>[AKCEPTUJ]</bold></light_purple></click> <click:run_command:'/tpadeny'><red><bold>[ODRZUĆ]</bold></red></click>"
request-accepted: "<green>Prośba o teleportację zaakceptowana."
request-denied: "<red>Prośba o teleportację odrzucona."
request-expired: "<yellow>Prośba o teleportację wygasła."
request-cancelled: "<gold>Prośba o teleportację anulowana."
request-none-pending: "<red>Nie masz żadnej oczekującej prośby o teleportację."
request-none-outgoing: "<red>Nie masz żadnej wysłanej prośby o teleportację."
tpa-cooldown: "<yellow>TPA jest na odnowieniu. Pozostało <gold><seconds>s</gold><yellow>."
tpa-warmup: "<yellow>Nie ruszaj się! Teleportacja za <gold><seconds></gold><yellow> sekund..."
tpa-warmup-cancelled: "<red>Teleportacja anulowana — poruszyłeś się."

# ── Odliczanie (pasek akcji) ─────────────────────────────────────────
countdown-actionbar: "<gold>⏳ Teleportacja za <seconds>..."
countdown-chat: "<yellow><seconds>..."

# ── Admin Warpy ─────────────────────────────────────────────────────────
warp-created: "<green>Warp <gold><name></gold> utworzony."
warp-deleted: "<gold>Warp <gold><name></gold> usunięty."
warp-not-found: "<red>Warp <gold><name></gold> nie znaleziony."
warp-list-header: "<gray>Warpy:</gray> <gold><warps></gold>"
warp-teleporting: "<aqua>Teleportacja do warpu <gold><name></gold>..."

# ── Warpy Gracza (/pwarp) ──────────────────────────────────────────────
pwarp-created: "<green>Warp <gold><name></gold> utworzony. <gray>(<count>/<limit>)</gray>"
pwarp-deleted: "<gold>Warp <gold><name></gold> usunięty."
pwarp-not-found: "<red>Warp <gold><name></gold> nie znaleziony."
pwarp-limit-reached: "<red>Osiągnąłeś limit warpów (<limit>). Usuń warp lub ulepsz swoją rangę."
pwarp-no-permission: "<red>Nie masz uprawnień do tworzenia warpów."
pwarp-list-header: "<gray>Twoje warpy (<count>/<limit>):</gray> <gold><warps></gold>"
pwarp-list-empty: "<gray>Nie masz warpów. Użyj <gold>/pwarp set <name></gold> aby utworzyć."
pwarp-teleporting: "<aqua>Teleportacja do warpu <gold><name></gold>..."
pwarp-made-public: "<green>Warp <gold><name></gold> jest teraz <aqua>publiczny</aqua>."
pwarp-made-private: "<green>Warp <gold><name></gold> jest teraz <red>prywatny</red>."
pwarp-not-yours: "<red>Ten warp należy do innego gracza i jest prywatny."
pwarp-player-not-found: "<red>Gracz <gold><player></gold> nie znaleziony."

