listwarps-none: "<gray>Nie znaleziono warpów graczy na żadnym serwerze."
listwarps-header: "<gold><bold>--- Warpy Graczy (<count> łącznie) ---</bold></gold>"
listwarps-player-none: "<gray><player> nie ma warpów."
