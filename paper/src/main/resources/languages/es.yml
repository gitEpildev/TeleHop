# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — Español (es)
# ═══════════════════════════════════════════════════════════════════════
#
#  Formato MiniMessage. Referencia: https://docs.advntr.dev/minimessage/
#
#  Marcadores (NO traducir):
#    <target>  — jugador objetivo      <sender>  — jugador que envía
#    <name>    — nombre del warp       <warps>   — lista separada por comas
#    <count>   — cantidad actual       <limit>   — límite de warps
#    <player>  — otro jugador
#
# ═══════════════════════════════════════════════════════════════════════

prefix: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> "

# ── General ─────────────────────────────────────────────────────────────
no-permission: "<red>No tienes permiso para usar este comando."
player-not-found: "<red>Ese jugador no está en línea."
console-not-allowed: "<red>Este comando solo se puede usar dentro del juego."
feature-disabled: "<red>Esta función está desactivada en este servidor."

# ── TPA ─────────────────────────────────────────────────────────────────
request-sent: "<aqua>Solicitud de teletransporte enviada a <gold><target></gold><aqua>."
request-received: "<aqua><sender></aqua> <gray>quiere teletransportarse a ti. Usa</gray> <light_purple>/tpaaccept</light_purple> <gray>o</gray> <red>/tpadeny</red><gray>.</gray>"
request-received-here: "<aqua><sender></aqua> <gray>quiere que te teletransportes a él. Usa</gray> <light_purple>/tpaaccept</light_purple> <gray>o</gray> <red>/tpadeny</red><gray>.</gray>"
request-actions: "<click:run_command:'/tpaaccept'><light_purple><bold>[ACEPTAR]</bold></light_purple></click> <click:run_command:'/tpadeny'><red><bold>[RECHAZAR]</bold></red></click>"
request-accepted: "<green>Solicitud de teletransporte aceptada."
request-denied: "<red>Solicitud de teletransporte rechazada."
request-expired: "<yellow>La solicitud de teletransporte ha expirado."
request-cancelled: "<gold>Solicitud de teletransporte cancelada."
request-none-pending: "<red>No tienes ninguna solicitud de teletransporte pendiente."
request-none-outgoing: "<red>No tienes ninguna solicitud de teletransporte saliente."
tpa-cooldown: "<yellow>TPA está en enfriamiento. <gold><seconds>s</gold><yellow> restantes."
tpa-warmup: "<yellow>¡No te muevas! Teletransportando en <gold><seconds></gold><yellow> segundos..."
tpa-warmup-cancelled: "<red>Teletransporte cancelado — te moviste."

# ── Cuenta regresiva (barra de acción) ──────────────────────────────
countdown-actionbar: "<gold>⏳ Teletransportando en <seconds>..."
