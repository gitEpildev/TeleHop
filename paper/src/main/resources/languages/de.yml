# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — Deutsch (de)
# ═══════════════════════════════════════════════════════════════════════
#
#  MiniMessage-Format. Referenz: https://docs.advntr.dev/minimessage/
#
#  Platzhalter (NICHT übersetzen):
#    <target>  — Zielspieler           <sender>  — Absender
#    <name>    — Warp-Name             <warps>   — kommagetrennte Liste
#    <count>   — aktuelle Warp-Anzahl  <limit>   — Warp-Limit
#    <player>  — anderer Spieler
#
# ═══════════════════════════════════════════════════════════════════════

prefix: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> "

# ── Allgemein ───────────────────────────────────────────────────────────
no-permission: "<red>Du hast keine Berechtigung, diesen Befehl zu verwenden."
player-not-found: "<red>Dieser Spieler ist nicht online."
console-not-allowed: "<red>Dieser Befehl kann nur im Spiel verwendet werden."
feature-disabled: "<red>Diese Funktion ist auf diesem Server deaktiviert."

# ── TPA ─────────────────────────────────────────────────────────────────
request-sent: "<aqua>Teleportanfrage an <gold><target></gold> <aqua>gesendet."
request-received: "<aqua><sender></aqua> <gray>möchte sich zu dir teleportieren. Verwende</gray> <light_purple>/tpaaccept</light_purple> <gray>oder</gray> <red>/tpadeny</red><gray>.</gray>"
request-received-here: "<aqua><sender></aqua> <gray>möchte, dass du dich zu ihm teleportierst. Verwende</gray> <light_purple>/tpaaccept</light_purple> <gray>oder</gray> <red>/tpadeny</red><gray>.</gray>"
request-actions: "<click:run_command:'/tpaaccept'><light_purple><bold>[ANNEHMEN]</bold></light_purple></click> <click:run_command:'/tpadeny'><red><bold>[ABLEHNEN]</bold></red></click>"
request-accepted: "<green>Teleportanfrage angenommen."
request-denied: "<red>Teleportanfrage abgelehnt."
request-expired: "<yellow>Teleportanfrage abgelaufen."
request-cancelled: "<gold>Teleportanfrage abgebrochen."
request-none-pending: "<red>Du hast keine ausstehende Teleportanfrage."
request-none-outgoing: "<red>Du hast keine ausgehende Teleportanfrage."
tpa-cooldown: "<yellow>TPA hat eine Abklingzeit. Noch <gold><seconds>s</gold><yellow>."
tpa-warmup: "<yellow>Nicht bewegen! Teleportation in <gold><seconds></gold><yellow> Sekunden..."
tpa-warmup-cancelled: "<red>Teleportation abgebrochen — du hast dich bewegt."

# ── Countdown (Aktionsleiste) ────────────────────────────────────────
