# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — 简体中文 (zh)
# ═══════════════════════════════════════════════════════════════════════
#
#  MiniMessage 格式。参考: https://docs.advntr.dev/minimessage/
#
#  占位符（请勿翻译）:
#    <target>  — 目标玩家             <sender>  — 发送者
#    <name>    — 传送点名称           <warps>   — 逗号分隔列表
#    <count>   — 当前传送点数量       <limit>   — 传送点上限
#    <player>  — 其他玩家
#
# ═══════════════════════════════════════════════════════════════════════

prefix: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> "

# ── 通用 ────────────────────────────────────────────────────────────────
no-permission: "<red>你没有权限使用此命令。"
player-not-found: "<red>该玩家不在线。"
console-not-allowed: "<red>此命令只能在游戏内使用。"
feature-disabled: "<red>此功能在此服务器上已禁用。"

# ── TPA ─────────────────────────────────────────────────────────────────
request-sent: "<aqua>已向 <gold><target></gold> <aqua>发送传送请求。"
request-received: "<aqua><sender></aqua> <gray>想要传送到你身边。使用</gray> <light_purple>/tpaaccept</light_purple> <gray>或</gray> <red>/tpadeny</red><gray>。</gray>"
request-received-here: "<aqua><sender></aqua> <gray>想要你传送到他身边。使用</gray> <light_purple>/tpaaccept</light_purple> <gray>或</gray> <red>/tpadeny</red><gray>。</gray>"
request-actions: "<click:run_command:'/tpaaccept'><light_purple><bold>[接受]</bold></light_purple></click> <click:run_command:'/tpadeny'><red><bold>[拒绝]</bold></red></click>"
request-accepted: "<green>传送请求已接受。"
request-denied: "<red>传送请求已拒绝。"
request-expired: "<yellow>传送请求已过期。"
request-cancelled: "<gold>传送请求已取消。"
request-none-pending: "<red>你没有待处理的传送请求。"
request-none-outgoing: "<red>你没有发出的传送请求。"
tpa-cooldown: "<yellow>TPA 正在冷却中，还剩 <gold><seconds></gold><yellow> 秒。"
tpa-warmup: "<yellow>不要移动！<gold><seconds></gold><yellow> 秒后传送..."
tpa-warmup-cancelled: "<red>传送取消 — 你移动了。"

# ── 倒计时（动作栏）──────────────────────────────────────────────────
countdown-actionbar: "<gold>⏳ <seconds> 秒后传送..."
countdown-chat: "<yellow><seconds>..."

# ── 管理员传送点 ────────────────────────────────────────────────────────
warp-created: "<green>传送点 <gold><name></gold> 已创建。"
warp-deleted: "<gold>传送点 <gold><name></gold> 已删除。"
warp-not-found: "<red>传送点 <gold><name></gold> 未找到。"
warp-list-header: "<gray>传送点:</gray> <gold><warps></gold>"
warp-teleporting: "<aqua>正在传送到 <gold><name></gold>..."

# ── 玩家传送点 (/pwarp) ────────────────────────────────────────────────
pwarp-created: "<green>传送点 <gold><name></gold> 已创建。<gray>(<count>/<limit>)</gray>"
pwarp-deleted: "<gold>传送点 <gold><name></gold> 已删除。"
pwarp-not-found: "<red>传送点 <gold><name></gold> 未找到。"
pwarp-limit-reached: "<red>你已达到传送点上限 (<limit>)。删除一个传送点或升级你的等级。"
pwarp-no-permission: "<red>你没有权限创建传送点。"
pwarp-list-header: "<gray>你的传送点 (<count>/<limit>):</gray> <gold><warps></gold>"
pwarp-list-empty: "<gray>你还没有传送点。使用 <gold>/pwarp set <name></gold> 来创建一个。"
pwarp-teleporting: "<aqua>正在传送到 <gold><name></gold>..."
pwarp-made-public: "<green>传送点 <gold><name></gold> 现在是<aqua>公开的</aqua>。"
pwarp-made-private: "<green>传送点 <gold><name></gold> 现在是<red>私密的</red>。"
pwarp-not-yours: "<red>该传送点属于其他玩家且为私密状态。"
pwarp-player-not-found: "<red>玩家 <gold><player></gold> 未找到。"

# ── 出生点 ──────────────────────────────────────────────────────────────
spawn-sent: "<aqua>正在传送到出生点..."

# ── 随机传送 ────────────────────────────────────────────────────────────
rtp-opening: "<aqua>请选择一个区域和维度。"
rtp-searching: "<gold>正在寻找安全的位置..."
rtp-teleporting: "<green>正在传送..."
rtp-failed: "<red>未找到安全的位置，请重试。"
rtp-cooldown: "<yellow>随机传送正在冷却中，还剩 <gold><seconds></gold><yellow> 秒。"
rtp-delay: "<yellow>不要移动！<gold><seconds></gold><yellow> 秒后传送..."
rtp-cancelled: "<red>传送取消 — 你移动了。"

# ── 列表 (/listwarps) ───────────────────────────────────────────────
listwarps-none: "<gray>所有服务器上没有找到玩家传送点。"
listwarps-header: "<gold><bold>--- 玩家传送点（共 <count> 个）---</bold></gold>"
listwarps-player-none: "<gray><player> 没有传送点。"
listwarps-player-header: "<gold><bold>--- <player> 的传送点（<count>）---</bold></gold>"

# ── 管理 ────────────────────────────────────────────────────────────────
reload-success: "<green>TeleHop 配置已重新加载。"
forcedelwarp-deleted: "<gold>已强制删除 <gold><player></gold> 的传送点 <gold><name></gold>。"
forcedelwarp-admin-deleted: "<gold>已强制删除管理员传送点 <gold><name></gold>。"

# ── 版本 ─────────────────────────────────────────────────────────────
version-info: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> <white>版本 <gold><version></gold>"

