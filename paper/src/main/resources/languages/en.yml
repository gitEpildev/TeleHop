# ═══════════════════════════════════════════════════════════════════════
#  TeleHop — English (en)
# ═══════════════════════════════════════════════════════════════════════
#
#  Uses MiniMessage format. Reference: https://docs.advntr.dev/minimessage/
#
#  Placeholders (do NOT translate these):
#    <target>  — target player name    <sender>  — sending player name
#    <name>    — warp name             <warps>   — comma-separated list
#    <count>   — current warp count    <limit>   — warp limit
#    <player>  — another player's name
#
# ═══════════════════════════════════════════════════════════════════════

prefix: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> "

# ── General ─────────────────────────────────────────────────────────────
no-permission: "<red>You don't have permission to use this command."
player-not-found: "<red>That player is not online."
console-not-allowed: "<red>This command can only be used in-game."
feature-disabled: "<red>This feature is disabled on this server."

# ── TPA ─────────────────────────────────────────────────────────────────
request-sent: "<aqua>Teleport request sent to <gold><target></gold><aqua>."
request-received: "<aqua><sender></aqua> <gray>wants to teleport to you. Use</gray> <light_purple>/tpaaccept</light_purple> <gray>or</gray> <red>/tpadeny</red><gray>.</gray>"
request-received-here: "<aqua><sender></aqua> <gray>wants you to teleport to them. Use</gray> <light_purple>/tpaaccept</light_purple> <gray>or</gray> <red>/tpadeny</red><gray>.</gray>"
request-actions: "<click:run_command:'/tpaaccept'><light_purple><bold>[ACCEPT]</bold></light_purple></click> <click:run_command:'/tpadeny'><red><bold>[DENY]</bold></red></click>"
request-accepted: "<green>Teleport request accepted."
request-denied: "<red>Teleport request denied."
request-expired: "<yellow>Teleport request expired."
request-cancelled: "<gold>Teleport request cancelled."
request-none-pending: "<red>You have no pending teleport request."
request-none-outgoing: "<red>You have no outgoing teleport request."
tpa-cooldown: "<yellow>TPA is on cooldown. <gold><seconds>s</gold><yellow> remaining."
tpa-warmup: "<yellow>Don't move! Teleporting in <gold><seconds></gold><yellow> seconds..."
tpa-warmup-cancelled: "<red>Teleport cancelled — you moved."

# ── Countdown (action bar) ───────────────────────────────────────────
countdown-actionbar: "<gold>⏳ Teleporting in <seconds>..."
countdown-chat: "<yellow><seconds>..."

# ── Admin Warps ─────────────────────────────────────────────────────────
warp-created: "<green>Warp <gold><name></gold> created."
warp-deleted: "<gold>Warp <gold><name></gold> deleted."
warp-not-found: "<red>Warp <gold><name></gold> not found."
warp-list-header: "<gray>Warps:</gray> <gold><warps></gold>"
warp-teleporting: "<aqua>Teleporting to warp <gold><name></gold>..."

# ── Player Warps (/pwarp) ──────────────────────────────────────────────
pwarp-created: "<green>Warp <gold><name></gold> created. <gray>(<count>/<limit>)</gray>"
pwarp-deleted: "<gold>Warp <gold><name></gold> deleted."
pwarp-not-found: "<red>Warp <gold><name></gold> not found."
pwarp-limit-reached: "<red>You've reached your warp limit (<limit>). Delete a warp or upgrade your rank."
pwarp-no-permission: "<red>You don't have permission to create warps."
pwarp-list-header: "<gray>Your warps (<count>/<limit>):</gray> <gold><warps></gold>"
pwarp-list-empty: "<gray>You have no warps. Use <gold>/pwarp set <name></gold> to create one."
pwarp-teleporting: "<aqua>Teleporting to warp <gold><name></gold>..."
pwarp-made-public: "<green>Warp <gold><name></gold> is now <aqua>public</aqua>."
pwarp-made-private: "<green>Warp <gold><name></gold> is now <red>private</red>."
pwarp-not-yours: "<red>That warp belongs to another player and is private."
pwarp-player-not-found: "<red>Player <gold><player></gold> not found."

# ── Spawn ───────────────────────────────────────────────────────────────
spawn-sent: "<aqua>Teleporting to spawn..."

# ── RTP ─────────────────────────────────────────────────────────────────
rtp-opening: "<aqua>Select a region and dimension."
rtp-searching: "<gold>Searching for a safe location..."
rtp-teleporting: "<green>Teleporting..."
rtp-failed: "<red>No safe location found. Try again."
rtp-cooldown: "<yellow>RTP is on cooldown. <gold><seconds>s</gold><yellow> remaining."
rtp-delay: "<yellow>Don't move! Teleporting in <gold><seconds></gold><yellow> seconds..."
rtp-cancelled: "<red>Teleport cancelled — you moved."

# ── Listwarps (/listwarps) ──────────────────────────────────────────
listwarps-none: "<gray>No player warps found across all servers."
listwarps-header: "<gold><bold>--- Player Warps (<count> total) ---</bold></gold>"
listwarps-player-none: "<gray><player> has no warps."
listwarps-player-header: "<gold><bold>--- <player>'s Warps (<count>) ---</bold></gold>"

# ── Admin ────────────────────────────────────────────────────────────────
reload-success: "<green>TeleHop configuration reloaded."
forcedelwarp-deleted: "<gold>Force-deleted warp <gold><name></gold> from <gold><player></gold>."
forcedelwarp-admin-deleted: "<gold>Force-deleted admin warp <gold><name></gold>."

# ── Version ──────────────────────────────────────────────────────────
version-info: "<gray>[<gradient:green:aqua>TeleHop</gradient>]</gray> <white>Version <gold><version></gold>"

